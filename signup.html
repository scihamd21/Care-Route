<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب - Care Route</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signup-style.css">
  <link rel="icon" type="image/png" href="../الوكو بس.png">
</head>
<body>

  <!-- خلفية ديكورية -->
  <svg class="bg-decor" viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
    <circle cx="650" cy="180" r="120" fill="#abd4f0" opacity="0.25"/>
    <circle cx="680" cy="340" r="70" fill="#abd4f0" opacity="0.15"/>
    <circle cx="720" cy="650" r="50" fill="#abd4f0" opacity="0.2"/>
    <circle cx="740" cy="720" r="30" fill="#abd4f0" opacity="0.12"/>
  </svg>

  <div class="wrap">

    <!-- لوجو -->
    <div class="logo-top">
      <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
        <path d="M60,55 Q30,45 25,25 Q20,5 45,10 Q60,13 65,30 Q70,13 85,10 Q110,5 105,25 Q100,45 70,55 Q65,57 60,55Z" fill="none" stroke="#0b2149" stroke-width="11" stroke-linecap="round"/>
        <path d="M25,25 Q20,5 45,10 Q60,13 65,30" fill="none" stroke="#fff" stroke-width="5" stroke-dasharray="10,7" stroke-linecap="round"/>
        <circle cx="88" cy="44" r="5" fill="#fff" stroke="#0b2149" stroke-width="2"/>
        <circle cx="88" cy="58" r="5" fill="#fff" stroke="#0b2149" stroke-width="2"/>
        <path d="M65,55 Q65,70 88,44" fill="none" stroke="#0b2149" stroke-width="11" stroke-linecap="round"/>
        <path d="M65,55 Q65,70 88,44" fill="none" stroke="#e8dfc8" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <div class="logo-text">
        <span class="logo-c">C</span><span class="logo-route">ARE ROUTE</span>
      </div>
    </div>

    <!-- الكارت الرئيسي -->
    <div class="card">
      <h2 class="card-title">إنشاء حساب</h2>

      <!-- صورة البروفايل -->
      <div class="pic-area">
        <div class="pic-circle" id="picCircle" onclick="document.getElementById('fileInput').click()">
          <span class="plus-icon">+</span>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        <span class="pic-label" onclick="document.getElementById('fileInput').click()">إضافة صورة (اختياري)</span>
        <button class="remove-btn" id="removeBtn" onclick="removePhoto()">✕ إزالة الصورة</button>
      </div>

      <!-- حقول الفورم -->
      <div class="form-grid">

        <div class="field">
          <label>الاسم كامل</label>
          <div class="input-box">
            <input type="text" placeholder="الاسم الكامل">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>العمر</label>
          <div class="input-box">
            <input type="number" placeholder="العمر">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>رقم الفون</label>
          <div class="input-box">
            <input type="tel" placeholder="رقم الهاتف">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7 12.8 12.8 0 0 0 .7 2.8 2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5 12.8 12.8 0 0 0 2.8.7A2 2 0 0 1 22 16.9z"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>رقم الهوية</label>
          <div class="input-box">
            <input type="text" placeholder="الرقم القومي">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>الجيميل</label>
          <div class="input-box">
            <input type="email" placeholder="البريد الإلكتروني">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-10 7L2 7"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>تأكيد الجيميل</label>
          <div class="input-box">
            <input type="email" placeholder="تأكيد البريد">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-10 7L2 7"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>كلمة المرور</label>
          <div class="input-box">
            <input type="password" placeholder="كلمة المرور">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>تأكيد كلمة المرور</label>
          <div class="input-box">
            <input type="password" placeholder="تأكيد كلمة المرور">
            <svg class="iicon" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1" fill="#888"/>
            </svg>
          </div>
        </div>

      </div><!-- /form-grid -->

      <!-- أسئلة طبية -->
      <div class="medical">
        <h3 class="medical-title">أسئلة طبية أولية</h3>

        <p class="q-label">السؤال الأول: *من هو المريض؟</p>
        <div class="radio-row" id="patientRadio">
          <label class="radio-opt active">
            <span class="check-icon"><span class="check-dot"></span></span> أنا
          </label>
          <label class="radio-opt">
            <span class="check-icon"></span> أحد من العائلة
          </label>
          <label class="radio-opt">
            <span class="check-icon"></span> آخر
          </label>
        </div>

        <p class="q-label">السؤال الثاني: *أي من الأمراض تعاني؟</p>
        <textarea class="diseases" placeholder="اكتب هنا..."></textarea>
      </div>

      <button class="submit-btn">إنشاء حساب</button>

      <!-- سوشيال -->
      <div class="social-section">
        <p class="social-label">تسجيل الدخول عبر وسائل التواصل</p>
        <div class="social-icons">

          <div class="s-icon">
            <div class="s-icon-circle">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
            </div>
            <span>Google</span>
          </div>

          <div class="s-icon">
            <div class="s-icon-circle">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2"/>
              </svg>
            </div>
            <span>Facebook</span>
          </div>

          <div class="s-icon">
            <div class="s-icon-circle">
              <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#000"/>
              </svg>
            </div>
            <span>Apple</span>
          </div>

        </div>
      </div>

      <!-- فوتر الكارت -->
      <div class="footer-card">
        لديك حساب؟ <a href="../تسجيل الدخول/index.html">تسجيل الدخول</a>
        <p>Already have an account? <strong>Sign In</strong></p>
      </div>

    </div><!-- /card -->

    <!-- فوتر الصفحة -->
    <footer class="page-footer">
      <a href="#">Terms of Service</a>
      <span>|</span>
      <a href="#">Privacy Policy</a>
      <span>|</span>
      <a href="#">Contact Us</a>
    </footer>

  </div><!-- /wrap -->

  <script src="signup-script.js"></script>
</body>
</html>
