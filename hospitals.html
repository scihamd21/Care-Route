<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="hospitals-style.css">
  <link rel="icon" type="image/png" href="../الوكو بس.png">
</head>
<body>


<nav class="navbar">
    <div class="nav-actions">
        <div class="profile-pic">
            <img src="../Generated Image September 08, 2025 - 5_17PM.jpg" alt="User"> </div>
        <div class="notification">
            <i class="far fa-bell"></i> <span class="dot"></span>
        </div>
    </div>

    <div class="nav-links">
        <a href="../الصفحه الرايسيه التانيه/index.html" class="active">الرئيسية</a>
        <a href="../المستشفي/hospitals.html">المستشفيات</a>
        <a href="../طوارء/index.html">طوارئ</a>
        <a href="../المحفطة/wallet.html">المحفظة</a>
        <a href="../شات طبي/chat.html">شات طبي</a>
        <a href="../بنك الدم/blood-bank.html">بنك الدم</a>
    </div>

    <div class="logo">
        <img src="./img/الوجو مع الاسم.png" alt="logo">
    </div>
</nav>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">المستشفيات القريبة</h2>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="يبحث..." />
        </div>
      </div>

      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="open">مفتوح</button>
        <button class="filter-btn" data-filter="closed">مغلق</button>
      </div>

      <div class="hospital-list" id="hospitalList">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>جاري تحديد موقعك...</p>
        </div>
      </div>
    </aside>

    <main class="map-wrapper">
      <div id="map"></div>

      <button class="locate-btn" id="locateBtn" title="موقعي الحالي">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </button>

      <div class="map-legend">
        <div class="legend-item"><span class="dot open"></span> مفتوح</div>
        <div class="legend-item"><span class="dot closed"></span> مغلق</div>
        <div class="legend-item"><span class="dot nearest"></span> الأقرب</div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="hospitals-script.js"></script>
</body>
</html>
